theme = "rose_pine"

[editor]
line-number = "relative"
scrolloff = 10
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
mouse = false
idle-timeout = 0
completion-timeout = 5
popup-border = "all"
auto-save = false
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "▏"

[editor.soft-wrap]
enable = false

[editor.file-picker]
hidden = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator"]
center = ["version-control"]
right = [
  "diagnostics",
  "selections",
  "position",
  "position-percentage",
]

[keys.normal]
C-s = ":w"
C-q = ":q"

esc = ["collapse_selection", "keep_primary_selection"]

[keys.insert]
j = { k = "normal_mode" }
