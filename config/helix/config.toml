theme = "rose_pine"

[editor]
line-number = "relative"
default-yank-register = "+"
scrolloff = 10
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
mouse = false
idle-timeout = 0
completion-timeout = 5
popup-border = "all"
auto-save = false
auto-format = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = false

[editor.soft-wrap]
enable = false

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator"]
center = ["version-control"]
right = [
  "diagnostics",
  "selections",
  "position",
  "position-percentage",
]

[keys.normal]
esc = ["collapse_selection","keep_primary_selection"]
y = "yank_main_selection_to_clipboard"
p = "paste_clipboard_after"
P = "paste_clipboard_before"
d = "delete_selection_noyank"
c = "change_selection_noyank"

[keys.select]
y = "yank_main_selection_to_clipboard"
